name: Auto Fix
on:
  workflow_dispatch:
permissions: read-all

jobs:
  sort:
    name: "sort classes"
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: ./.github/actions/sort-classes # SECURITY TODO: pin to commit SHA
        continue-on-error: true
      - name: Commit and push changes
        run: |
          # Commit and push changes
          git config --local user.name "${{ github.actor }}"
          git config --local user.email "github-action-${{ github.actor }}@users.noreply.github.com"
          git commit -a -m "Sorting classes" || true
          git fetch origin $GITHUB_REF_NAME
          git rebase origin/$GITHUB_REF_NAME
          git push origin HEAD:$GITHUB_REF_NAME

  mypy:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: ./.github/actions/mypy # SECURITY TODO: pin to commit SHA
        continue-on-error: true
      - name: Commit and push changes
        run: |
          # Commit and push changes
          git config --local user.name "${{ github.actor }}"
          git config --local user.email "github-action-${{ github.actor }}@users.noreply.github.com"
          git commit -a -m "Fixing MyPy" || true
          git fetch origin $GITHUB_REF_NAME
          git rebase origin/$GITHUB_REF_NAME
          git push origin HEAD:$GITHUB_REF_NAME

  pre-commit-fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: ./.github/actions/pre-commit # SECURITY TODO: pin to commit SHA
        continue-on-error: true
      - name: Commit and push changes
        run: |
          # Commit and push changes
          git config --local user.name "${{ github.actor }}"
          git config --local user.email "github-action-${{ github.actor }}@users.noreply.github.com"
          git commit -a -m "Fixing pre-compile" || true
          git fetch origin $GITHUB_REF_NAME
          git rebase origin/$GITHUB_REF_NAME
          git push origin HEAD:$GITHUB_REF_NAME
